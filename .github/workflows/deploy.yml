name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bartvdven/package-lock.json

      - name: Install dependencies
        working-directory: bartvdven
        run: npm ci

      - name: Build
        working-directory: bartvdven
        run: npm run build
        env:
          NEXT_BASE_PATH: /claude-website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bartvdven/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
